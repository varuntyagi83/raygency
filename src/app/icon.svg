<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="orb" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#FFB088"/>
      <stop offset="60%" stop-color="#FA6147"/>
      <stop offset="100%" stop-color="#E04A32"/>
    </radialGradient>
    <radialGradient id="gloss" cx="35%" cy="30%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Shadow/glow -->
  <circle cx="16" cy="17" r="12" fill="rgba(250,97,71,0.3)" filter="url(#glow)"/>
  <!-- Main orb -->
  <circle cx="16" cy="16" r="12" fill="url(#orb)"/>
  <!-- Glass highlight -->
  <ellipse cx="13" cy="12" rx="6" ry="5" fill="url(#gloss)"/>
</svg>
